<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Breathing Practice</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
:root{
  --circle-size: min(70vw, 420px);
  --text-color: #ffffff;
  --circle-color: #ffffff;
  --bg-color: #ffffff;
  --phase-font-size: 24px; 
}

*{
  box-sizing:border-box;
  margin:0;
  padding:0;
}

body{
  font-family:'Inter',sans-serif;
  background:var(--bg-color);
  color:var(--text-color);
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:flex-start;
  height:100vh;
  text-align:center;
  padding-top:60px;
}

#header{
  margin-bottom:40px;
}

#title{
  font-size:clamp(22px,3vw,30px);
  font-weight:600;
}

#description{
  font-size:clamp(14px,2vw,18px);
  font-style:italic;
  opacity:.7;
  margin-top:6px;
  margin-bottom:6px;
  transition: opacity .6s ease;
}

  #duration{
  font-style:italic;
  margin-top:2px;
  opacity:.7;
  font-size:clamp(14px,2vw,18px);
  margin-bottom:40px;
  transition: opacity .6s ease;
}

  #duration strong{
  font-weight:600;
  opacity:.7;
}

  .fade-out{
  opacity:0 !important;
}

#circle{
  width:var(--circle-size);
  height:var(--circle-size);
  opacity: 1;
  border-radius:50%;
  border:3px solid var(--circle-color);
  display:flex;
  align-items:center;
  justify-content:center;
    transition-property: transform, box-shadow;
  will-change: transform, box-shadow;
  margin-bottom:80px;
}

#phase{
  font-weight: 800;    /* bolder text */
  font-size: var(--phase-font-size);
 }

 #startBtn{
width:80px;
height:80px;
border-radius:50%;
border:none;
background:rgba(255,255,255,0.2);
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
}

  #startBtn svg{
width:36px;
height:36px;
fill:white;
}

  #audioControls{
  margin-top:28px;
  display:flex;
  gap:22px;
}

.audioBtn.active{
background:rgba(255,255,255,0.2);
border:none;
}

  .iconBtn{
width:80px;
height:80px;
border-radius:50%;
border:none;
background:rgba(255,255,255,0.2);
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
}

.iconBtn svg{
width:34px;
height:34px;
fill:white;
}

 .audioBtn{
width:64px;
height:64px;
border-radius:50%;
border:none;
background:rgba(255,255,255,0.2);
display:flex;
align-items:center;
justify-content:center;
position:relative;
cursor:pointer;
transition:transform .15s ease, background .2s ease;
}

.audioBtn svg{
width:32px;
height:32px;
fill:var(--text-color);
}

.audioBtn .strike{
position:absolute;
width:80%;
height:2px;
background:var(--text-color);
transform:rotate(-45deg);
opacity:0;
}

.audioBtn:not(.active) .strike{
opacity:1;
}

  .audioBtn:active,
.iconBtn:active{
transform:scale(.92);
}

  #resetBtn svg{
width:36px;
height:36px;
}

  #resetBtn svg{
transition: transform .45s cubic-bezier(.34,1.56,.64,1);
}

#resetBtn.spin svg{
transform: rotate(200deg) scale(1.08);
}
  
</style>
</head>

<body>

<div id="header">
  <div id="title">Breathing</div>
  <div id="description"></div>
  <div id="duration"></div>
</div>

<div id="circle">
  <div id="phase">Ready</div>
</div>

<button id="startBtn" class="iconBtn">
<svg id="playIcon" viewBox="0 0 24 24">
<polygon points="6,4 20,12 6,20"></polygon>
</svg>

<svg id="pauseIcon" viewBox="0 0 24 24" style="display:none">
<rect x="6" y="4" width="4" height="16"></rect>
<rect x="14" y="4" width="4" height="16"></rect>
</svg>
</button>

<div id="audioControls">

<button id="ambientToggle" class="audioBtn active">
<svg viewBox="0 0 24 24">
<path d="M12 3v10.55A4 4 0 1 0 14 17V7h4V3h-6z"/>
</svg>
<span class="strike"></span>
</button>

<button id="resetBtn" class="audioBtn">
<svg viewBox="0 0 24 24">
<path d="M12 5V2L8 6l4 4V7a5 5 0 1 1-5 5H5a7 7 0 1 0 7-7z"/>
</svg>
</button>

<button id="bellToggle" class="audioBtn active">
<svg viewBox="0 0 24 24">
<path d="M12 22a2 2 0 0 0 2-2h-4a2 2 0 0 0 2 2zm6-6V11a6 6 0 1 0-12 0v5L4 18v1h16v-1l-2-2z"/>
</svg>
<span class="strike"></span>
</button>

</div>

<script>
const SUPABASE_URL = "https://tppyzexttkuvcobbbmaz.supabase.co";
const SUPABASE_KEY = "sb_publishable_VZiTsc0JGVx6tVf2Zu-9uQ_-FwjGpQW";

let practice = null;
let cycleSteps = [];
let totalTime = 0;
let ambientAudio = null;
let endAudio = null;
let minScale = 1;
let maxScale = 1.3;
let animationCurve = "linear";
let stopPractice = false;
let ambientVolume = 0.5;
let bellVolume = 0.7;
let ambientEnabled = true;
let bellEnabled = true;

  const titleEl = document.getElementById("title");
  const descriptionEl = document.getElementById("description");
  const durationEl = document.getElementById("duration");

  const playIcon = document.getElementById("playIcon");
  const pauseIcon = document.getElementById("pauseIcon");

  const ambientToggle = document.getElementById("ambientToggle");
  const resetBtn = document.getElementById("resetBtn");
  const bellToggle = document.getElementById("bellToggle");

// Ambient Audio Toggle
if (ambientToggle) {
  ambientToggle.addEventListener("click", () => {
    ambientEnabled = !ambientEnabled;
    ambientToggle.classList.toggle("active", ambientEnabled);

    if (!ambientAudio && practice?.audio_url) {
      ambientAudio = new Audio(practice.audio_url);
      ambientAudio.loop = true;
      ambientAudio.volume = ambientVolume;
    }

    if (ambientAudio) {
      if (ambientEnabled) {
        ambientAudio.currentTime = 0; // restart from beginning
        ambientAudio.play().catch(()=>{});
      } else {
        ambientAudio.pause();
      }
    }
  });
}

// Bell Toggle
if (bellToggle) {
  bellToggle.addEventListener("click", () => {
    bellEnabled = !bellEnabled;
    bellToggle.classList.toggle("active", bellEnabled);

    // Optional: stop any bell currently playing
    if (endAudio && !bellEnabled) {
      endAudio.pause();
      endAudio.currentTime = 0; // reset to start
    }
  });
}

// Reset Practice
if (resetBtn) {
  resetBtn.addEventListener("click", () => {

  resetBtn.classList.add("spin");
  setTimeout(()=> resetBtn.classList.remove("spin"), 450);

    stopPractice = true;

    const circle = document.getElementById("circle");
    const phaseEl = document.getElementById("phase");

    // Stop audio
    if(ambientAudio){
      ambientAudio.pause();
      ambientAudio.currentTime = 0;
    }

    if(endAudio){
      endAudio.pause();
      endAudio.currentTime = 0;
    }

    // Reset visuals
    circle.style.transform = `scale(${minScale})`;
    circle.style.boxShadow = practice.glow_color
      ? `0 0 40px ${practice.glow_color}`
      : "";

    phaseEl.innerText = "Ready";
    phaseEl.style.transform = "scale(1)";  

    // Reset button UI
    playIcon.style.display = "block";
    pauseIcon.style.display = "none";

    titleEl.classList.remove("fade-out");
    descriptionEl.classList.remove("fade-out");
    durationEl.classList.remove("fade-out");

  });
}

// Load practice
async function loadPractices(){
  try{
    const res = await fetch(`${SUPABASE_URL}/rest/v1/breathpractice_with_theme?select=*&id=eq.1`,{
      headers:{apikey:SUPABASE_KEY, Authorization:`Bearer ${SUPABASE_KEY}`}
    });
    if(!res.ok) throw new Error(`Supabase error ${res.status}`);

    const data = await res.json();
    practice = data[0];
    if(!practice){ alert("No practice found"); return; }

    document.getElementById("title").innerText = practice.name;
    document.getElementById("description").innerText = practice.description || "";
    document.getElementById("duration").innerHTML = `<strong>Duration:</strong> ${practice.practicetime} minutes`;

        minScale = practice.min_size || 1;
    maxScale = practice.max_size || 1.3;
    animationCurve = practice.animation_curve || "linear";

    cycleSteps = [
      {label:"Inhale", seconds:practice.inhale_seconds},
      {label:"Hold", seconds:practice.hold1_seconds},
      {label:"Exhale", seconds:practice.exhale_seconds},
      {label:"Hold", seconds:practice.hold2_seconds}
    ].filter(s => (s.seconds??0)>0);

    totalTime = practice.practicetime * 60;

    applyTheme(practice);
    renderDesign(practice.design || "circle");

  }catch(err){
    console.error(err);
    alert("Failed to load practice");
  }
}

// Apply theme

// ===== Apply theme =====
function applyTheme(p){
  const circle = document.getElementById("circle");
  const phase = document.getElementById("phase");

  // Background and text colors
  if(p.bg_color) document.documentElement.style.setProperty("--bg-color", p.bg_color);
  if(p.text_color) document.documentElement.style.setProperty("--text-color", p.text_color);
  if(p.circle_color) document.documentElement.style.setProperty("--circle-color", p.circle_color);

  // New background image logic
  if(p.bg_image){
    const overlayColor = p.bg_overlay_color || "#000000";
    const opacity = (p.bg_opacity ?? 50) / 100; // default 50%
    document.body.style.background = `
      linear-gradient(rgba(${hexToRgb(overlayColor)}, ${opacity}), rgba(${hexToRgb(overlayColor)}, ${opacity})),
      url(${p.bg_image}) center/cover no-repeat
    `;
  } 
  // fallback to gradients if no bg_image
  else if(p.bg_start_gradient && p.bg_end_gradient){
    document.body.style.background = `linear-gradient(${p.bg_start_gradient}, ${p.bg_end_gradient})`;
  }

  // Single opacity setting (controls circle, text, and glow)
  const opacity = p.opacity ?? 1; // default full opacity if not set
  circle.style.opacity = opacity;

  // Glow using opacity to scale intensity
  if(p.glow_color){
    circle.style.boxShadow = `0 0 ${40 * opacity}px ${p.glow_color}`;
  }
}

// helper function to convert hex to rgb for overlay
function hexToRgb(hex){
  const clean = hex.replace("#","").trim();
  const bigint = parseInt(clean,16);
  const r = (bigint >> 16) & 255;
  const g = (bigint >> 8) & 255;
  const b = bigint & 255;
  return `${r},${g},${b}`;
}
 

// Render design
function renderDesign(type){
  switch(type){
    case "wave": startWaveBreathing(); break;
    case "circle":
    default: startCircleBreathing();
  }
}

// Circle placeholder
function startCircleBreathing(){
  document.getElementById("phase").style.transform = "scale(1)";
  
  const circle = document.getElementById("circle");
  const phaseEl = document.getElementById("phase");
  
  circle.style.transition = `transform 1s linear, box-shadow 1s linear`;
  circle.style.transform = `scale(${minScale})`;
  phaseEl.style.transform = "scale(1)";
}

// Wave placeholder
function startWaveBreathing(){ console.log("Wave breathing loaded"); }

  async function startCountdown(){
  const phaseEl = document.getElementById("phase");

  const steps = ["3","2","1","Inhale"];

  for(const s of steps){
    phaseEl.innerText = s;
    await new Promise(r => setTimeout(r,1000));
    if(stopPractice) return false;
  }

  return true;
}

// ======= Breathing Engine (Time Synced) =======
async function startBreathing(){

  const circle = document.getElementById("circle");
  const phaseEl = document.getElementById("phase");

  const startTime = performance.now();
  const endTime = startTime + totalTime*1000;

  let stepIndex = 0;
  let currentScale = minScale;

  while(!stopPractice && performance.now() < endTime){

    const step = cycleSteps[stepIndex];

    phaseEl.innerText = step.label;

    if(step.label === "Inhale") currentScale = maxScale;
    else if(step.label === "Exhale") currentScale = minScale;

    circle.style.transition =
      `transform ${step.seconds}s ${animationCurve},
       box-shadow ${step.seconds}s ${animationCurve}`;

    circle.style.transform = `scale(${currentScale})`;
    phaseEl.style.transform = "scale(1)";
    
    if(practice.glow_color){
      if(step.label === "Inhale"){
        circle.style.boxShadow =
          `0 0 ${60*(practice.opacity??1)+30*maxScale}px ${practice.glow_color}`;
      }else{
        circle.style.boxShadow =
          `0 0 ${60*(practice.opacity??1)}px ${practice.glow_color}`;
      }
    }

    const targetTime = performance.now() + step.seconds*1000;

    while(performance.now() < targetTime){
      if(stopPractice) break;
      await new Promise(r => setTimeout(r,40));
    }

    stepIndex = (stepIndex+1) % cycleSteps.length;
  }

  if(!stopPractice) finishPractice();
}
// End

  function fadeOutAudio(audio, duration = 2000){
  return new Promise(resolve => {
    if(!audio) return resolve();

    const stepTime = 50;
    const steps = duration / stepTime;
    const volumeStep = audio.volume / steps;

    const fade = setInterval(()=>{
      if(audio.volume > volumeStep){
        audio.volume -= volumeStep;
      } else {
        audio.volume = 0;
        clearInterval(fade);
        audio.pause();
        resolve();
      }
    }, stepTime);
  });
}
  
async function finishPractice(){
  const phaseEl = document.getElementById("phase");
  phaseEl.innerText = "Complete";

  titleEl.classList.remove("fade-out");
  descriptionEl.classList.remove("fade-out");
  durationEl.classList.remove("fade-out");

  await fadeOutAudio(ambientAudio, 2000);
  
  if(endAudio && bellEnabled){
    endAudio.volume = bellVolume;
    endAudio.play();
  }
}

// Button
const startBtn = document.getElementById("startBtn");

startBtn.addEventListener("click", async () => {
  const circle = document.getElementById("circle");
  const phaseEl = document.getElementById("phase");

 if(playIcon.style.display !== "none"){
    stopPractice = false;
    playIcon.style.display = "none";
    pauseIcon.style.display = "block";

    titleEl.classList.add("fade-out");
    descriptionEl.classList.add("fade-out");
    durationEl.classList.add("fade-out");

    // Reset circle to minScale when starting
    circle.style.transform = `scale(${minScale})`;
    phaseEl.innerText = "Ready";

    if(practice.audio_url && ambientEnabled){

  if(!ambientAudio){
    ambientAudio = new Audio(practice.audio_url);
    ambientAudio.loop = true;
    ambientAudio.volume = ambientVolume;
  }

  ambientAudio.currentTime = 0;
  ambientAudio.play().catch(()=>{});
}
    if(practice.audio_end_url) endAudio = new Audio(practice.audio_end_url);

   // breathing loop
    const ready = await startCountdown();
    if(!ready) return;

    await startBreathing(); 

    // Reset button after finish
    playIcon.style.display = "block";
    pauseIcon.style.display = "none";
   
  } else {
    // Stop button clicked
    stopPractice = true;
    playIcon.style.display = "block";
    pauseIcon.style.display = "none";
    
    titleEl.classList.remove("fade-out");
    descriptionEl.classList.remove("fade-out");
    durationEl.classList.remove("fade-out");

    if(ambientAudio){
  ambientAudio.pause();
  ambientAudio.currentTime = 0;
}
    if(endAudio) endAudio.pause();

    phaseEl.innerText = "Paused";
    circle.style.transform = `scale(${minScale})`;
    circle.style.boxShadow = practice.glow_color ? `0 0 40px ${practice.glow_color}` : "";
    phaseEl.style.transform = "scale(1)";
  }
});
  
// Load on start
loadPractices();
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Breathing Practice</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
:root{
  --circle-size: min(60vw, 420px);
  --text-color: white;
  --circle-color: white;
  --bg-color: black;
}

*{
  box-sizing:border-box;
  margin:0;
  padding:0;
}

body{
  font-family:'Inter',sans-serif;
  background:var(--bg-color);
  color:var(--text-color);
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  height:100vh;
  text-align:center;
}

#header{
  margin-bottom:20px;
}

#title{
  font-size:clamp(22px,3vw,30px);
  font-weight:600;
}

#description{
  font-size:clamp(14px,2vw,18px);
  font-style:italic;
  opacity:.7;
  margin-top:6px;
}

#circle{
  width:var(--circle-size);
  height:var(--circle-size);
  border-radius:50%;
  border:3px solid var(--circle-color);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:clamp(18px,2.5vw,26px);
  transition-property: transform;
  will-change: transform;
}

#phase{
  opacity:.9;
}

#timer{
  margin-top:25px;
  font-size:clamp(14px,2vw,18px);
  opacity:.6;
  margin-bottom:20px;
}

#startBtn{
  padding:14px 28px;
  border-radius:16px;
  border:none;
  background:rgba(255,255,255,0.2);
  color:white;
  font-size:clamp(22px,3vw,30px);
  cursor:pointer;
}
</style>
</head>

<body>

<div id="header">
  <div id="title">Breathing</div>
  <div id="description"></div>
</div>

<div id="circle">
  <div id="phase">Ready</div>
</div>

<div id="timer"></div>

<button id="startBtn">Start Practice</button>

<script>
const SUPABASE_URL = "https://tppyzexttkuvcobbbmaz.supabase.co";
const SUPABASE_KEY = "sb_publishable_VZiTsc0JGVx6tVf2Zu-9uQ_-FwjGpQW";

let practices = [];
let practice = null;
let cycleSteps = [];
let totalTime = 0;
let ambientAudio = null;
let endAudio = null;

let minScale = 1;
let maxScale = 1.3;
let animationCurve = "linear";

design = "circle"
design = "wave"
design = "orb"
design = "pulse"

// Load practices from Supabase
async function loadPractices() {
  try {
  const res = await fetch(
`${SUPABASE_URL}/rest/v1/breathpractice_with_theme?select=*&id=eq.1`,
{
 headers:{
  apikey: SUPABASE_KEY,
  Authorization:`Bearer ${SUPABASE_KEY}`
 }
});

if (!res.ok) {
  throw new Error(`Supabase error ${res.status}`);
}

const data = await res.json();

console.log("Practice loaded:", data);



practice = data[0];
applyTheme(practice);

minScale = practice.min_size || 1;
maxScale = practice.max_size || 1.3;
animationCurve = practice.animation_curve || "linear";

if (!practice) {
  alert("No practice found!");
  return;
}

document.getElementById("title").innerText = practice.name;
document.getElementById("description").innerText = practice.description || "";

    // Prepare cycle steps
   cycleSteps = [
  { label: "Inhale", seconds: practice.inhale_seconds },
  { label: "Hold", seconds: practice.hold1_seconds },
  { label: "Exhale", seconds: practice.exhale_seconds },
  { label: "Hold", seconds: practice.hold2_seconds }
  ].filter(s => (s.seconds ?? 0) > 0);
    totalTime = practice.practicetime * 60;

  } catch (err) {
    console.error(err);
    alert("Sorry failed to load practice.");
  }
}

// Start button click
document.getElementById("startBtn").addEventListener("click", async () => {
  document.getElementById("startBtn").style.display = "none";

  // Ambient audio
 if(practice.audio_url){
  try {
    ambientAudio = new Audio(practice.audio_url);
    ambientAudio.loop = true;
    ambientAudio.volume = 0.6;
    ambientAudio.play();
  } catch(e){
    console.warn("Could not play ambient audio", e);
  }
}

  if(practice.audio_end_url){
    endAudio = new Audio(practice.audio_end_url);
  }

  await startBreathing();
});

  function applyTheme(p){

  if(p.bg_color){
    document.documentElement.style.setProperty("--bg-color", p.bg_color);
  }

  if(p.text_color){
    document.documentElement.style.setProperty("--text-color", p.text_color);
  }

  if(p.circle_color){
    document.documentElement.style.setProperty("--circle-color", p.circle_color);
  }

  // gradient background if present
  if(p.bg_start_gradient && p.bg_end_gradient){
    document.body.style.background =
      `linear-gradient(${p.bg_start_gradient}, ${p.bg_end_gradient})`;
  }

    function renderDesign(type) {
  switch(type) {

    case "wave":
      startWaveBreathing();
      break;

    case "circle":
    default:
      startCircleBreathing();
  }

}

  // circle glow
  if(p.glow_color){
    document.getElementById("circle").style.boxShadow =
      `0 0 40px ${p.glow_color}`;
  }

  // opacity
  if(p.opacity){
    document.getElementById("circle").style.opacity = p.opacity;
  }
}

// Main breathing loop
async function startBreathing() {
  let elapsed = 0;

  while (elapsed < totalTime) {
    for (const step of cycleSteps) {
      if (elapsed >= totalTime) break;
      await runStep(step);
      elapsed += step.seconds;
      updateTimer(elapsed);
    }
  }

  finishPractice();
}

// Animate a single step
function runStep(step) {
  return new Promise(resolve => {
    const circle = document.getElementById("circle");
    const phase = document.getElementById("phase");

    phase.innerText = step.label;
    circle.style.transitionDuration = step.seconds + "s";
    const scale = step.label === "Inhale" ? maxScale :
              step.label === "Exhale" ? minScale :
              circle.style.transform.replace("scale(","").replace(")","");

circle.style.transitionTimingFunction = animationCurve;
circle.style.transform = `scale(${scale})`;

    setTimeout(resolve, step.seconds * 1000);
  });
}

// Update countdown timer
function updateTimer(elapsed){
  const remaining = Math.max(0, totalTime - elapsed);
  const min = Math.floor(remaining/60);
  const sec = remaining % 60;
  document.getElementById("timer").innerText = `${min}:${sec.toString().padStart(2,'0')}`;
}

// End of practice
function finishPractice(){
  document.getElementById("phase").innerText = "Complete";

  if(ambientAudio) ambientAudio.pause();
  if(endAudio) endAudio.play();
}

  // Load practices on page load
loadPractices();

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Breathing Practice</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
:root{
  --circle-size: min(60vw, 420px);
  --text-color: white;
  --circle-color: white;
  --bg-color: #232f52;
}

*{
  box-sizing:border-box;
  margin:0;
  padding:0;
}

body{
  font-family:'Inter',sans-serif;
  background:var(--bg-color);
  color:var(--text-color);
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:flex-start;
  height:100vh;
  text-align:center;
  padding-top:60px;
}

#header{
  margin-bottom:40px;
}

#title{
  font-size:clamp(22px,3vw,30px);
  font-weight:600;
}

#description{
  font-size:clamp(14px,2vw,18px);
  font-style:italic;
  opacity:.7;
  margin-top:6px;
  margin-bottom:20px;
}

#circle{
  width:var(--circle-size);
  height:var(--circle-size);
  border-radius:50%;
  border:5px solid var(--circle-color);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:clamp(18px,2.5vw,26px);
  transition-property: transform, box-shadow;
  will-change: transform, box-shadow;
  margin-bottom:60px;
}

#phase{
  opacity:.9;
}

#startBtn{
  padding:14px 28px;
  border-radius:16px;
  border:none;
  background:rgba(255,255,255,0.2);
  color:white;
  font-size:clamp(22px,3vw,30px);
  cursor:pointer;
}
</style>
</head>

<body>

<div id="header">
  <div id="title">Breathing</div>
  <div id="description"></div>
</div>

<div id="circle">
  <div id="phase">Ready</div>
</div>

<button id="startBtn">Start Practice</button>

<script>
const SUPABASE_URL = "https://tppyzexttkuvcobbbmaz.supabase.co";
const SUPABASE_KEY = "sb_publishable_VZiTsc0JGVx6tVf2Zu-9uQ_-FwjGpQW";

let practice = null;
let cycleSteps = [];
let totalTime = 0;
let ambientAudio = null;
let endAudio = null;
let minScale = 1;
let maxScale = 1.3;
let animationCurve = "linear";
let stopPractice = false;

// Load practice
async function loadPractices(){
  try{
    const res = await fetch(`${SUPABASE_URL}/rest/v1/breathpractice_with_theme?select=*&id=eq.1`,{
      headers:{apikey:SUPABASE_KEY, Authorization:`Bearer ${SUPABASE_KEY}`}
    });
    if(!res.ok) throw new Error(`Supabase error ${res.status}`);

    const data = await res.json();
    practice = data[0];
    if(!practice){ alert("No practice found"); return; }

    document.getElementById("title").innerText = practice.name;
    document.getElementById("description").innerText = practice.description || "";

    minScale = practice.min_size || 1;
    maxScale = practice.max_size || 1.3;
    animationCurve = practice.animation_curve || "linear";

    cycleSteps = [
      {label:"Inhale", seconds:practice.inhale_seconds},
      {label:"Hold", seconds:practice.hold1_seconds},
      {label:"Exhale", seconds:practice.exhale_seconds},
      {label:"Hold", seconds:practice.hold2_seconds}
    ].filter(s => (s.seconds??0)>0);

    totalTime = practice.practicetime * 60;

    applyTheme(practice);
    renderDesign(practice.design || "circle");

  }catch(err){
    console.error(err);
    alert("Failed to load practice");
  }
}

// Apply theme
function applyTheme(p){
  const circle = document.getElementById("circle");
  if(p.bg_color) document.documentElement.style.setProperty("--bg-color", p.bg_color);
  if(p.text_color) document.documentElement.style.setProperty("--text-color", p.text_color);
  if(p.circle_color) document.documentElement.style.setProperty("--circle-color", p.circle_color);
  if(p.bg_start_gradient && p.bg_end_gradient){
    document.body.style.background = `linear-gradient(${p.bg_start_gradient}, ${p.bg_end_gradient})`;
  }
  if(p.glow_color) circle.style.boxShadow = `0 0 40px ${p.glow_color}`;
  if(p.opacity) circle.style.opacity = p.opacity;
}

// Render design
function renderDesign(type){
  switch(type){
    case "wave": startWaveBreathing(); break;
    case "circle":
    default: startCircleBreathing();
  }
}

// Circle placeholder
function startCircleBreathing(){
  const circle = document.getElementById("circle");
  circle.style.transition = `transform 1s linear, box-shadow 1s linear`;
  circle.style.transform = `scale(${minScale})`;
}

// Wave placeholder
function startWaveBreathing(){ console.log("Wave breathing loaded"); }

// ======= Breathing Engine =======
async function startBreathing(){
  const circle = document.getElementById("circle");
  const phaseEl = document.getElementById("phase");
  let currentScale = minScale;

  for(const step of cycleSteps){
    if(stopPractice) break;
    phaseEl.innerText = step.label;

    // Only scale on inhale/exhale
    if(step.label==="Inhale") currentScale = maxScale;
    else if(step.label==="Exhale") currentScale = minScale;
    // HOLD keeps currentScale

    // Animate
    circle.style.transition = `transform ${step.seconds}s ${animationCurve}, box-shadow ${step.seconds}s ${animationCurve}`;
    circle.style.transform = `scale(${currentScale})`;

    // Glow
    if(practice.glow_color){
      circle.style.boxShadow = (step.label==="Inhale") 
        ? `0 0 ${40 + 20*maxScale}px ${practice.glow_color}`
        : `0 0 40px ${practice.glow_color}`;
    }

    await new Promise(r=>setTimeout(r, step.seconds*1000));
     if(stopPractice) break;
  }

  finishPractice();
}

// End
function finishPractice(){
  const phaseEl = document.getElementById("phase");
  phaseEl.innerText = "Complete";
  if(ambientAudio) ambientAudio.pause();
  if(endAudio) endAudio.play();
}

// Button
const startBtn = document.getElementById("startBtn");

startBtn.addEventListener("click", async () => {
  if(startBtn.innerText === "Start Practice"){
    stopPractice = false;
    startBtn.innerText = "Stop Practice";

    if(practice.audio_url){
      ambientAudio = new Audio(practice.audio_url);
      ambientAudio.loop = true;
      ambientAudio.volume = 0.6;
      ambientAudio.play().catch(()=>{});
    }
    if(practice.audio_end_url) endAudio = new Audio(practice.audio_end_url);

    await startBreathing();

    // Reset button after finish
    startBtn.innerText = "Start Practice";
  } else {
    // User clicked Stop
    stopPractice = true;
    startBtn.innerText = "Start Practice";
    if(ambientAudio) ambientAudio.pause();
    if(endAudio) endAudio.pause();
    const phaseEl = document.getElementById("phase");
    phaseEl.innerText = "Stopped";
    // Reset circle scale
    const circle = document.getElementById("circle");
    circle.style.transform = `scale(${minScale})`;
  }
});
  
// Load on start
loadPractices();
</script>

</body>
</html>

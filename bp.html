<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Breathing Practice</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
:root{
  --circle-size: min(70vw, 420px);
  --text-color: #ffffff;
  --circle-color: #ffffff;
  --bg-color: #ffffff;
  --phase-font-size: 24px; 
}

*{
  box-sizing:border-box;
  margin:0;
  padding:0;
}

body{
  font-family:'Inter',sans-serif;
  background:var(--bg-color);
  color:var(--text-color);
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:flex-start;
  height:100vh;
  text-align:center;
  padding-top:60px;
}

#header{
  margin-bottom:40px;
}

#title{
  font-size:clamp(22px,3vw,30px);
  font-weight:600;
}

#description{
  font-size:clamp(14px,2vw,18px);
  font-style:italic;
  opacity:.7;
  margin-top:6px;
  margin-bottom:6px;
  transition: opacity .6s ease;
}

#duration{
  font-style:italic;
  margin-top:2px;
  opacity:.7;
  font-size:clamp(14px,2vw,18px);
  margin-bottom:40px;
  transition: opacity .6s ease;
}

#duration strong{
  font-weight:600;
  opacity:.7;
}

.fade-out{
  opacity:0 !important;
}

/* WRAPPER for layering */
#circleWrapper{
  position:relative;
  width:var(--circle-size);
  height:var(--circle-size);
  margin-bottom:80px;
}

/* ACTUAL animated circle */
#circle{
  width:100%;
  height:100%;
  border-radius:50%;
  border:3px solid var(--circle-color);
  transition-property: transform, box-shadow;
  will-change: transform, box-shadow;
}

/* TEXT LAYER (separate from circle) */
#phase{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%, -50%);
  font-weight:800;
  font-size:var(--phase-font-size);
  pointer-events:none;
}

#startBtn{
width:80px;
height:80px;
border-radius:50%;
border:none;
background:rgba(255,255,255,0.2);
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
}

#startBtn svg{
width:36px;
height:36px;
fill:white;
}

#audioControls{
  margin-top:28px;
  display:flex;
  gap:22px;
}

.audioBtn.active{
background:rgba(255,255,255,0.2);
border:none;
}

.iconBtn{
width:80px;
height:80px;
border-radius:50%;
border:none;
background:rgba(255,255,255,0.2);
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
}

.iconBtn svg{
width:34px;
height:34px;
fill:white;
}

.audioBtn{
width:64px;
height:64px;
border-radius:50%;
border:none;
background:rgba(255,255,255,0.2);
display:flex;
align-items:center;
justify-content:center;
position:relative;
cursor:pointer;
transition:transform .15s ease, background .2s ease;
}

.audioBtn svg{
width:32px;
height:32px;
fill:var(--text-color);
}

.audioBtn .strike{
position:absolute;
width:80%;
height:2px;
background:var(--text-color);
transform:rotate(-45deg);
opacity:0;
}

.audioBtn:not(.active) .strike{
opacity:1;
}

.audioBtn:active,
.iconBtn:active{
transform:scale(.92);
}

#resetBtn svg{
width:36px;
transition: transform .45s cubic-bezier(.34,1.56,.64,1);
}

#resetBtn.spin svg{
transform: rotate(200deg) scale(1.08);
}
</style>
</head>

<body>

<div id="header">
  <div id="title">Breathing</div>
  <div id="description"></div>
  <div id="duration"></div>
</div>

<!-- NEW WRAPPER -->
<div id="circleWrapper">
  <div id="circle"></div>
  <div id="phase">Ready</div>
</div>

<button id="startBtn" class="iconBtn">
<svg id="playIcon" viewBox="0 0 24 24">
<polygon points="6,4 20,12 6,20"></polygon>
</svg>

<svg id="pauseIcon" viewBox="0 0 24 24" style="display:none">
<rect x="6" y="4" width="4" height="16"></rect>
<rect x="14" y="4" width="4" height="16"></rect>
</svg>
</button>

<div id="audioControls">

<button id="ambientToggle" class="audioBtn active">
<svg viewBox="0 0 24 24">
<path d="M12 3v10.55A4 4 0 1 0 14 17V7h4V3h-6z"/>
</svg>
<span class="strike"></span>
</button>

<button id="resetBtn" class="audioBtn">
<svg viewBox="0 0 24 24">
<path d="M12 5V2L8 6l4 4V7a5 5 0 1 1-5 5H5a7 7 0 1 0 7-7z"/>
</svg>
</button>

<button id="bellToggle" class="audioBtn active">
<svg viewBox="0 0 24 24">
<path d="M12 22a2 2 0 0 0 2-2h-4a2 2 0 0 0 2 2zm6-6V11a6 6 0 1 0-12 0v5L4 18v1h16v-1l-2-2z"/>
</svg>
<span class="strike"></span>
</button>

</div>

<script>
// (UNCHANGED LOGIC — only removed ALL phaseEl scaling lines)

const SUPABASE_URL = "https://tppyzexttkuvcobbbmaz.supabase.co";
const SUPABASE_KEY = "sb_publishable_VZiTsc0JGVx6tVf2Zu-9uQ_-FwjGpQW";

let practice = null;
let cycleSteps = [];
let totalTime = 0;
let ambientAudio = null;
let endAudio = null;
let minScale = 1;
let maxScale = 1.3;
let animationCurve = "linear";
let stopPractice = false;

const phaseEl = document.getElementById("phase");
const circle = document.getElementById("circle");

// simplified breathing loop
async function startBreathing(){
  let stepIndex = 0;

  while(!stopPractice){
    const step = cycleSteps[stepIndex];

    phaseEl.innerText = step.label;

    let targetScale = minScale;
    if(step.label === "Inhale") targetScale = maxScale;
    if(step.label === "Exhale") targetScale = minScale;

    circle.style.transition = `transform ${step.seconds}s ${animationCurve}`;
    circle.style.transform = `scale(${targetScale})`;

    await new Promise(r => setTimeout(r, step.seconds * 1000));

    stepIndex = (stepIndex+1) % cycleSteps.length;
  }
}
</script>

</body>
</html>

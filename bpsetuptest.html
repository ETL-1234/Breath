<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Meditation Timer</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>
:root{
  --bg-color:#232f52;
  --text-color:#ffffff;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:'Inter',sans-serif;
  background:var(--bg-color);
  color:var(--text-color);
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  height:100vh;
  gap:18px;
  padding:20px;
}

  #pageTitle {
  font-family: 'Inter', sans-serif;
  font-size: 24px;
  color: #ffffff;
  text-align: center;
  margin-bottom: 160px;
}

  #pageSubtitle {
  font-family: 'Inter', sans-serif;
  font-size: 18px;
  font-style: italic;
  color: rgba(255,255,255,0.6); /* same soft opacity style */
  text-align: center;
  margin-top: -160px; /* pulls it closer to the title */
  margin-bottom: 40px; /* space before buttons */
}

  /* DURATION WHEEL */
  .column{
  height:132px;
  width:100px;
  overflow-y:scroll;
  scroll-snap-type:y mandatory;
  -ms-overflow-style:none;
  scrollbar-width:none;
  display:flex;
  flex-direction:column;
  justify-content: flex-start;
}

.column::-webkit-scrollbar{
  display:none;
}

.item{
  height:44px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:22px;
  opacity:.4;
  scroll-snap-align:center;
}

.item.active{
  opacity:1;
  font-weight:600;
  transform:scale(1.05);
}

.highlight{
  position:absolute;
  top:50%;
  left:50%;
  transform:translateX(-50%);
  width:100px;
  height:44px;
  border-top:1px solid rgba(255,255,255,0.2);
  border-bottom:1px solid rgba(255,255,255,0.2);
  pointer-events:none;
}
  
/* BUTTONS */

.option-btn {
  display: flex;
  justify-content: flex-start; /* keep labels left-aligned */
  align-items: center;
  width: 100%;
  max-width: 320px;
  padding: 18px;
  border-radius: 18px;
  border: none;
  background: rgba(255,255,255,0.08);
  color: white;
  font-size: 18px;
  cursor: pointer;
  gap: 20px; /* space between label and value */
}

.option-btn .label {
  flex: 0 0 140px; /* fixed width for all labels */
  color: white;    /* full white */
  font-style: normal; /* remove italic */
  opacity: 1; /* full opacity */
  text-align: left;
}

.option-btn .value {
  flex: 1 1 auto;
  color: rgba(255,255,255,0.6); /* slightly transparent */
  font-style: italic;
  text-align: left;
}

.option-btn span{
  opacity:.6;
  font-style:italic;
}

/* START BUTTON */

#startBtn{
  margin-top:20px;
  width:90px;
  height:90px;
  border-radius:50%;
  border:none;
  background:rgba(255,255,255,0.15);
  color:white;
  font-size:18px;
  cursor:not-allowed;
  opacity:.4;
  display:flex;
  align-items:center;
  justify-content:center;
}

#startBtn.active{
  cursor:pointer;
  opacity:1;
}
</style>
</head>

<body>

<h1 id="pageTitle">Practice Settings</h1>
<p id="pageSubtitle">Breath practices</p>

    <div class="option-btn" style="flex-direction:column; align-items:center; gap:12px; padding:18px;">

  <div class="label" style="width:100%; text-align:left;">Duration</div>

  <div style="position:relative; display:flex; justify-content:center;">
    <div id="minutes" class="column"></div>
    <div class="highlight"></div>

    <div style="
  position:absolute;
  left:calc(50% + 50px);
  top:50%;
  transform:translateY(-50%);
  font-size:16px;
  color: rgba(255,255,255,0.6);
  font-style: italic;
  pointer-events:none;
  line-height:44px;
    ">
      minutes
    </div>
  </div>

</div>    

<button class="option-btn" id="spokenBtn">
  <span class="label">Spoken</span>
  <span class="value" id="spokenText">Off</span>
</button>

<button class="option-btn" id="bellBtn">
  <span class="label">End bell</span>
  <span class="value" id="bellText">Off</span>
</button>

<button class="option-btn" id="musicBtn">
  <span class="label">Music</span>
  <span class="value" id="musicText">Off</span>
</button>

<button class="option-btn" id="designBtn">
  <span class="label">Design</span>
  <span class="value" id="designText">Circle</span>
</button>

<button id="startBtn">Start</button>

<script>

const col = document.getElementById("minutes");

const itemHeight = 44;
const visibleCount = 3;

// CREATE ITEMS
function createItems() {

  const minValue = 1;
  const maxValue = 60;
  const repeat = 20; // creates long scroll illusion

  for(let r = 0; r < repeat; r++){
    for(let i = minValue; i <= maxValue; i++){
      const el = document.createElement("div");
      el.className = "item";
      el.innerText = String(i).padStart(2, "0");
      col.appendChild(el);
    }
  }
}
  
createItems();

function scrollToValue(value){

  const totalItems = col.children.length;
  const middleIndex = Math.floor(totalItems / 2);

  const targetIndex = middleIndex + value;

  col.scrollTop = targetIndex * itemHeight - (col.offsetHeight / 2 - itemHeight / 2);
}

scrollToValue(10);

function updateActive(){
  const items = col.querySelectorAll(".item");
  const center = col.scrollTop + col.offsetHeight/2;

  items.forEach(item=>{
    const offset = item.offsetTop + item.offsetHeight/2;
    const distance = Math.abs(center - offset);
    item.classList.toggle("active", distance < itemHeight / 2);
  });
}

function getValue(){

  const center = col.scrollTop + col.offsetHeight / 2;
  const index = Math.round(center / itemHeight);

  const value = ((index % 60) + 60) % 60 || 60;

  return value;
}

let scrollTimeout;

col.addEventListener("scroll", () => {

  updateActive();

const totalHeight = col.scrollHeight;
const visibleHeight = col.offsetHeight;

if(col.scrollTop < itemHeight * 60){
  col.scrollTop += itemHeight * 60 * 10;
}
else if(col.scrollTop > totalHeight - itemHeight * 60){
  col.scrollTop -= itemHeight * 60 * 10;
}
  // --- save value after scroll stops ---
  clearTimeout(scrollTimeout);
  scrollTimeout = setTimeout(() => {
    const value = getValue();
    localStorage.setItem("breath_duration", value);

  }, 80);
});

setTimeout(updateActive, 50);
  
let spoken = false;
let bell = false;
let music = false;
let design = "circle";

const spokenText = document.getElementById("spokenText");
const bellText = document.getElementById("bellText");
const musicText = document.getElementById("musicText");
const designText = document.getElementById("designText");
const startBtn = document.getElementById("startBtn");

// --- TOGGLES ---
document.getElementById("spokenBtn").onclick = () => {
  spoken = !spoken;
  spokenText.innerText = spoken ? "On" : "Off";
};

document.getElementById("bellBtn").onclick = () => {
  bell = !bell;
  bellText.innerText = bell ? "On" : "Off";
};

document.getElementById("musicBtn").onclick = () => {
  music = !music;
  musicText.innerText = music ? "On" : "Off";
};

// --- DESIGN SWITCH ---
document.getElementById("designBtn").onclick = () => {
  design = design === "circle" ? "ripple" : "circle";
  designText.innerText = design.charAt(0).toUpperCase() + design.slice(1);
};

// --- ENABLE START ---
startBtn.classList.add("active");

// --- START ---
startBtn.onclick = () => {

  const duration = localStorage.getItem("breath_duration") || 10;

  localStorage.setItem("breath_duration", duration);
  localStorage.setItem("breath_spoken", spoken);
  localStorage.setItem("breath_bell", bell);
  localStorage.setItem("breath_music", music);
  localStorage.setItem("breath_design", design);

  window.location.href = "https://etl-1234.github.io/Breath/bptest.html";
};

</script>

</body>
</html>

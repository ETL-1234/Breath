<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Meditation Timer</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>
:root{
  --bg-color:#232f52;
  --text-color:#ffffff;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:'Inter',sans-serif;
  background:var(--bg-color);
  color:var(--text-color);
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  height:100vh;
  gap:18px;
  padding:20px;
}

  #pageTitle {
  font-family: 'Inter', sans-serif;
  font-size: 24px;
  color: #ffffff;
  text-align: center;
  margin-bottom: 160px;
}

  #pageSubtitle {
  font-family: 'Inter', sans-serif;
  font-size: 18px;
  font-style: italic;
  color: rgba(255,255,255,0.6); /* same soft opacity style */
  text-align: center;
  margin-top: -160px; /* pulls it closer to the title */
  margin-bottom: 40px; /* space before buttons */
}
  
/* BUTTONS */

.option-btn {
  display: flex;
  justify-content: flex-start; /* keep labels left-aligned */
  align-items: center;
  width: 100%;
  max-width: 420px;
  padding: 18px;
  border-radius: 18px;
  border: none;
  background: rgba(255,255,255,0.08);
  color: white;
  font-size: 18px;
  cursor: pointer;
  gap: 20px; /* space between label and value */
}

.option-btn .label {
  flex: 0 0 140px; /* fixed width for all labels */
  color: white;    /* full white */
  font-style: normal; /* remove italic */
  opacity: 1; /* full opacity */
  text-align: left;
}

.option-btn .value {
  flex: 1 1 auto;
  color: rgba(255,255,255,0.6); /* slightly transparent */
  font-style: italic;
  text-align: left;
}

.option-btn span{
  opacity:.6;
  font-style:italic;
}

/* START BUTTON */

#startBtn{
  margin-top:20px;
  width:90px;
  height:90px;
  border-radius:50%;
  border:none;
  background:rgba(255,255,255,0.15);
  color:white;
  font-size:18px;
  cursor:not-allowed;
  opacity:.4;
  display:flex;
  align-items:center;
  justify-content:center;
}

#startBtn.active{
  cursor:pointer;
  opacity:1;
}
</style>
</head>

<body>

<h1 id="pageTitle">Practice Settings</h1>
<p id="pageSubtitle">Breath practices</p>
  
<button class="option-btn">
  <span class="label">Duration</span>
  <span class="value" id="durationText">10 min</span>
</button>

<button class="option-btn" id="spokenBtn">
  <span class="label">Spoken</span>
  <span class="value" id="spokenText">Off</span>
</button>

<button class="option-btn" id="bellBtn">
  <span class="label">End bell</span>
  <span class="value" id="bellText">Off</span>
</button>

<button class="option-btn" id="musicBtn">
  <span class="label">Music</span>
  <span class="value" id="musicText">Off</span>
</button>

<button class="option-btn" id="designBtn">
  <span class="label">Design</span>
  <span class="value" id="designText">Circle</span>
</button>

<button id="startBtn">Start</button>

<script>

// LOAD SAVED SETTINGS
const duration = localStorage.getItem("timer_duration");
const endBell = localStorage.getItem("timer_endbell");
const interval = localStorage.getItem("timer_interval");
const theme = localStorage.getItem("timer_theme");

// ELEMENTS
const durationText = document.getElementById("durationText");
const endBellText = document.getElementById("endBellText");
const intervalText = document.getElementById("intervalText");
const themeText = document.getElementById("themeText");
const startBtn = document.getElementById("startBtn");

// APPLY VALUES
if(duration) durationText.innerText = duration;
if(endBell) endBellText.innerText = endBell;
if(interval) intervalText.innerText = interval;
if(theme) themeText.innerText = theme;

// ENABLE START BUTTON
function checkReady(){
  if(duration && endBell){
    startBtn.classList.add("active");
    startBtn.style.cursor = "pointer";
  }
}

checkReady();

// NAVIGATION
document.getElementById("durationBtn").onclick = () => {
  window.location.href = "https://etl-1234.github.io/Timer/duration.html";
};

document.getElementById("endBellBtn").onclick = () => {
  window.location.href = "https://etl-1234.github.io/Timer/bell.html";
};

document.getElementById("intervalBtn").onclick = () => {
  window.location.href = "https://etl-1234.github.io/Timer/interval.html";
};

document.getElementById("themeBtn").onclick = () => {
  window.location.href = "https://etl-1234.github.io/Timer/grid.html";
};

// START
startBtn.onclick = () => {
  if(!startBtn.classList.contains("active")) return;
  window.location.href = "https://etl-1234.github.io/Timer/play.html";
};

</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
  margin:0;
  background:#0f172a;
  display:flex;
  align-items:center;
  justify-content:center;
  height:100vh;
}

.circle{
  width:140px;
  height:140px;
  border-radius:50%;
  background:white;
  opacity:0.15;
  animation: breathe 8s infinite ease-in-out;
}

@keyframes breathe{

  0%{
    transform:scale(1);
  }

  50%{
    transform:scale(2);
  }

  100%{
    transform:scale(1);
  }

}

</style>

</head>

<body>

<div class="circle"></div>

</body>
</html>

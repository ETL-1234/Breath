<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Breath Recording Timer</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #232f52;
  color: white;

  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.container {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 18px;
}

/* TIMER */
#timer {
  font-size: 48px;
}

/* ROWS */
.row {
  display: flex;
  gap: 10px;
}

/* BUTTONS */
.select-btn {
  width: 50px;
  height: 50px;
  border: 2px solid white;
  background: transparent;
  color: white;
  border-radius: 12px;
  cursor: pointer;
}

.select-btn.active {
  background: white;
  color: #232f52;
}

/* CIRCLES */
#circles {
  display: flex;
  gap: 10px;
}

.circle {
  width: 50px;
  height: 50px;
  border: 2px solid white;
  border-radius: 50%;

  display: flex;
  align-items: center;
  justify-content: center;

  color: #232f52;
  background: transparent;

  transition: all 0.3s ease;
}

.circle.inhale {
  background: white;
}

.circle.exhale {
  background: #b4cadb;
}

/* GLOW */
.circle.cue {
  box-shadow: 0 0 10px 3px rgba(255,255,255,0.6);
}

/* BOTTOM BUTTONS */
#bottom-controls {
  display: flex;
  gap: 10px;
  margin-top: 50px;
}

.control-btn {
  width: 110px;
  height: 50px;
  border: 2px solid white;
  background: transparent;
  color: white;
  border-radius: 12px;
  cursor: pointer;
}

.control-btn:hover {
  background: white;
  color: #232f52;
}
</style>
</head>

<body>

<div class="container">

  <div id="timer">00:00</div>

  <!-- BREATH RATE -->
  <div class="row" id="rateRow">
    <button class="select-btn active" onclick="setRate(4, this)">4</button>
    <button class="select-btn" onclick="setRate(5, this)">5</button>
    <button class="select-btn" onclick="setRate(6, this)">6</button>
    <button class="select-btn" onclick="setRate(7, this)">7</button>
    <button class="select-btn" onclick="setRate(8, this)">8</button>
  </div>

  <!-- RATIO -->
  <div class="row" id="ratioRow">
    <button class="select-btn active" onclick="setRatio(1,1,this)">1:1</button>
    <button class="select-btn" onclick="setRatio(3,6,this)">3:6</button>
    <button class="select-btn" onclick="setRatio(4,6,this)">4:6</button>
    <button class="select-btn" onclick="setRatio(4,8,this)">4:8</button>
    <button class="select-btn" onclick="setRatio(5,8,this)">5:8</button>
    <button class="select-btn" onclick="setRatio(6,8,this)">6:8</button>
  </div>

  <div id="circles"></div>

  <div id="bottom-controls">
    <button class="control-btn" onclick="startPause()">Start / Pause</button>
    <button class="control-btn" onclick="resetAll()">Reset</button>
  </div>

</div>

<script>
let breathRate = 4;
let inhaleRatio = 1;
let exhaleRatio = 1;

let interval = null;
let seconds = 0;
let running = false;

let cycleIndex = 0;

function setRate(rate, el) {
  breathRate = rate;

  document.querySelectorAll("#rateRow .select-btn").forEach(b => b.classList.remove("active"));
  el.classList.add("active");

  createCircles();
  resetCycles();
}

function setRatio(inhale, exhale, el) {
  inhaleRatio = inhale;
  exhaleRatio = exhale;

  document.querySelectorAll("#ratioRow .select-btn").forEach(b => b.classList.remove("active"));
  el.classList.add("active");
}

function createCircles() {
  const container = document.getElementById("circles");
  container.innerHTML = "";

  for (let i = 0; i < breathRate; i++) {
    const c = document.createElement("div");
    c.className = "circle";
    c.innerText = i + 1;
    container.appendChild(c);
  }
}

function updateTimer() {
  seconds++;
  let min = String(Math.floor(seconds / 60)).padStart(2, '0');
  let sec = String(seconds % 60).padStart(2, '0');
  document.getElementById("timer").innerText = `${min}:${sec}`;
}

function breathStep() {
  const circles = document.querySelectorAll(".circle");
  if (!circles.length) return;

  const cycleTime = 60 / breathRate;

  const totalRatio = inhaleRatio + exhaleRatio;
  const inhaleTime = (inhaleRatio / totalRatio) * cycleTime;

  const currentTime = seconds % 60;
  const currentCycle = Math.floor(currentTime / cycleTime);

  if (currentCycle !== cycleIndex) {
    cycleIndex = currentCycle;
    resetCycles();
  }

  let progress = currentTime % cycleTime;
  let circle = circles[cycleIndex];

  // CLEAR glow every frame
  circles.forEach(c => c.classList.remove("cue"));

  // GLOW just before transitions
  if (
    Math.abs(progress - inhaleTime) < 0.3 ||
    Math.abs(progress - cycleTime) < 0.3
  ) {
    circle.classList.add("cue");
  }

  if (progress < inhaleTime) {
    circle.classList.add("inhale");
  } else {
    circle.classList.remove("inhale");
    circle.classList.add("exhale");
  }
}

function resetCycles() {
  document.querySelectorAll(".circle").forEach(c => {
    c.classList.remove("inhale", "exhale", "cue");
  });
}

function loop() {
  updateTimer();
  breathStep();
}

function startPause() {
  if (!running) {
    interval = setInterval(loop, 1000);
    running = true;
  } else {
    clearInterval(interval);
    running = false;
  }
}

function resetAll() {
  clearInterval(interval);
  running = false;
  seconds = 0;
  cycleIndex = 0;

  document.getElementById("timer").innerText = "00:00";

  // reset selections
  inhaleRatio = 1;
  exhaleRatio = 1;

  document.querySelectorAll(".select-btn").forEach(b => b.classList.remove("active"));
  document.querySelector("#rateRow button").classList.add("active");
  document.querySelector("#ratioRow button").classList.add("active");

  createCircles();
  resetCycles();
}

createCircles();
</script>

</body>
</html>

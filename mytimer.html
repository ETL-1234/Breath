<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Breath Recording Timer</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #232f52;
  color: white;

  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

/* MAIN CONTAINER */
.container {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 20px;
}

/* TIMER */
#timer {
  font-size: 48px;
}

/* SELECT BUTTONS */
#controls {
  display: flex;
  gap: 10px;
}

.select-btn {
  width: 50px;
  height: 50px;
  border: 2px solid white;
  background: transparent;
  color: white;
  border-radius: 12px;
  font-size: 16px;
  cursor: pointer;
  transition: all 0.3s ease;
}

.select-btn.active {
  background: white;
  color: #232f52;
}

/* CIRCLES */
#circles {
  display: flex;
  gap: 10px;
}

.circle {
  width: 50px;
  height: 50px;
  border: 2px solid white;
  border-radius: 50%;

  display: flex;
  align-items: center;
  justify-content: center;

  color: #232f52;
  background: transparent;
  transition: all 0.4s ease;
}

.circle.inhale {
  background: white;
}

.circle.exhale {
  background: #b4cadb;
}

/* BOTTOM BUTTONS */
#bottom-controls {
  display: flex;
  gap: 10px;
}

.control-btn {
  width: 110px;
  height: 50px;
  border: 2px solid white;
  background: transparent;
  color: white;
  border-radius: 12px;
  font-size: 14px;
  cursor: pointer;
  transition: all 0.3s ease;
}

.control-btn:hover {
  background: white;
  color: #232f52;
}
</style>
</head>

<body>

<div class="container">

  <div id="timer">00:00</div>

  <div id="controls">
    <button class="select-btn" onclick="setRate(4, this)">4</button>
    <button class="select-btn" onclick="setRate(5, this)">5</button>
    <button class="select-btn" onclick="setRate(6, this)">6</button>
    <button class="select-btn" onclick="setRate(7, this)">7</button>
    <button class="select-btn" onclick="setRate(8, this)">8</button>
  </div>

  <div id="circles"></div>

  <div id="bottom-controls">
    <button class="control-btn" onclick="startPause()">Start / Pause</button>
    <button class="control-btn" onclick="resetAll()">Reset</button>
  </div>

</div>

<script>
let breathRate = 4;
let interval = null;
let seconds = 0;
let running = false;

let cycleIndex = 0;

function setRate(rate, el) {
  breathRate = rate;

  document.querySelectorAll(".select-btn").forEach(b => b.classList.remove("active"));
  el.classList.add("active");

  createCircles();
  resetCycles();
}

function createCircles() {
  const container = document.getElementById("circles");
  container.innerHTML = "";

  for (let i = 0; i < breathRate; i++) {
    const c = document.createElement("div");
    c.className = "circle";
    c.innerText = i + 1;
    container.appendChild(c);
  }
}

function updateTimer() {
  seconds++;
  let min = String(Math.floor(seconds / 60)).padStart(2, '0');
  let sec = String(seconds % 60).padStart(2, '0');
  document.getElementById("timer").innerText = `${min}:${sec}`;
}

function breathStep() {
  const circles = document.querySelectorAll(".circle");
  if (!circles.length) return;

  const cycleTime = 60 / breathRate;
  const halfCycle = cycleTime / 2;

  const currentTime = seconds % 60;
  const currentCycle = Math.floor(currentTime / cycleTime);

  if (currentCycle !== cycleIndex) {
    cycleIndex = currentCycle;
  }

  let progress = currentTime % cycleTime;
  let circle = circles[cycleIndex];

  if (progress < halfCycle) {
    circle.classList.remove("exhale");
    circle.classList.add("inhale");
  } else {
    circle.classList.remove("inhale");
    circle.classList.add("exhale");
  }

  if (currentTime === 0) {
    resetCycles();
  }
}

function resetCycles() {
  document.querySelectorAll(".circle").forEach(c => {
    c.classList.remove("inhale", "exhale");
  });
}

function loop() {
  updateTimer();
  breathStep();
}

function startPause() {
  if (!running) {
    interval = setInterval(loop, 1000);
    running = true;
  } else {
    clearInterval(interval);
    running = false;
  }
}

function resetAll() {
  clearInterval(interval);
  running = false;
  seconds = 0;
  cycleIndex = 0;
  document.getElementById("timer").innerText = "00:00";
  resetCycles();
}

createCircles();
</script>

</body>
</html>

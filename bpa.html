<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Breathing Practice - Ambient Particles</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
:root{
  --text-color:#ffffff;
  --bg-color:#000000;
  --particle-color:#ffffff;
}

*{ box-sizing:border-box; margin:0; padding:0; }

body{
  font-family:'Inter',sans-serif;
  background:var(--bg-color);
  color:var(--text-color);
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:flex-start;
  height:100vh;
  text-align:center;
  padding-top:60px;
}

#header{ margin-bottom:40px; }
#title{ font-size:clamp(22px,3vw,30px); font-weight:600; }
#description{ font-size:clamp(14px,2vw,18px); font-style:italic; opacity:.7; margin:6px 0; transition: opacity .6s ease; }
#duration{ font-style:italic; margin-top:2px; opacity:.7; font-size:clamp(14px,2vw,18px); margin-bottom:40px; transition: opacity .6s ease; }
#duration strong{ font-weight:600; opacity:.7; }

#particleContainer{
  width:min(70vw,420px);
  height:min(70vw,420px);
  margin-bottom:80px;
  position:relative;
  overflow:hidden;
  border-radius:50%;
}

#phase{
  font-weight:600;
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  font-size:clamp(18px,2.5vw,26px);
}

#startBtn{
  width:80px; height:80px; border-radius:50%; border:none; background:rgba(255,255,255,0.2);
  display:flex; align-items:center; justify-content:center; cursor:pointer;
}

#startBtn svg{ width:36px; height:36px; fill:white; }

#audioControls{ margin-top:28px; display:flex; gap:22px; }

.audioBtn.active{ background:rgba(255,255,255,0.2); border:none; }
.iconBtn{ width:80px; height:80px; border-radius:50%; border:none; background:rgba(255,255,255,0.2); display:flex; align-items:center; justify-content:center; cursor:pointer; }
.iconBtn svg{ width:34px; height:34px; fill:white; }
.audioBtn{ width:64px; height:64px; border-radius:50%; border:none; background:rgba(255,255,255,0.2); display:flex; align-items:center; justify-content:center; position:relative; cursor:pointer; transition:transform .15s ease, background .2s ease; }
.audioBtn svg{ width:32px; height:32px; fill:var(--text-color); }
.audioBtn .strike{ position:absolute; width:80%; height:2px; background:var(--text-color); transform:rotate(-45deg); opacity:0; }
.audioBtn:not(.active) .strike{ opacity:1; }
.audioBtn:active,.iconBtn:active{ transform:scale(.92); }
#resetBtn svg{ width:36px; transition: transform .45s cubic-bezier(.34,1.56,.64,1); }
#resetBtn.spin svg{ transform: rotate(200deg) scale(1.08); }
</style>
</head>

<body>

<div id="header">
  <div id="title">Breathing</div>
  <div id="description"></div>
  <div id="duration"></div>
</div>

<div id="particleContainer">
  <canvas id="particleCanvas"></canvas>
  <div id="phase">Ready</div>
</div>

<button id="startBtn" class="iconBtn">
<svg id="playIcon" viewBox="0 0 24 24">
<polygon points="6,4 20,12 6,20"></polygon>
</svg>
<svg id="pauseIcon" viewBox="0 0 24 24" style="display:none">
<rect x="6" y="4" width="4" height="16"></rect>
<rect x="14" y="4" width="4" height="16"></rect>
</svg>
</button>

<div id="audioControls">
  <button id="ambientToggle" class="audioBtn active">
    <svg viewBox="0 0 24 24"><path d="M12 3v10.55A4 4 0 1 0 14 17V7h4V3h-6z"/></svg><span class="strike"></span>
  </button>
  <button id="resetBtn" class="audioBtn">
    <svg viewBox="0 0 24 24"><path d="M12 5V2L8 6l4 4V7a5 5 0 1 1-5 5H5a7 7 0 1 0 7-7z"/></svg>
  </button>
  <button id="bellToggle" class="audioBtn active">
    <svg viewBox="0 0 24 24"><path d="M12 22a2 2 0 0 0 2-2h-4a2 2 0 0 0 2 2zm6-6V11a6 6 0 1 0-12 0v5L4 18v1h16v-1l-2-2z"/></svg>
    <span class="strike"></span>
  </button>
</div>

<script>
const SUPABASE_URL = "https://tppyzexttkuvcobbbmaz.supabase.co";
const SUPABASE_KEY = "sb_publishable_VZiTsc0JGVx6tVf2Zu-9uQ_-FwjGpQW";

let practice=null, cycleSteps=[], totalTime=0;
let ambientAudio=null, endAudio=null;
let stopPractice=false, ambientEnabled=true, bellEnabled=true;

const titleEl=document.getElementById("title");
const descriptionEl=document.getElementById("description");
const durationEl=document.getElementById("duration");
const playIcon=document.getElementById("playIcon");
const pauseIcon=document.getElementById("pauseIcon");
const ambientToggle=document.getElementById("ambientToggle");
const resetBtn=document.getElementById("resetBtn");
const bellToggle=document.getElementById("bellToggle");

const canvas=document.getElementById("particleCanvas");
const ctx=canvas.getContext("2d");
const container=document.getElementById("particleContainer");

let particles=[], stepIndex=0;

// ===== Load Practice =====
async function loadPractices(){
  try{
    const res=await fetch(`${SUPABASE_URL}/rest/v1/breathpractice_with_theme?select=*&id=eq.1`,{
      headers:{apikey:SUPABASE_KEY, Authorization:`Bearer ${SUPABASE_KEY}`}
    });
    if(!res.ok) throw new Error(`Supabase error ${res.status}`);
    const data=await res.json();
    practice=data[0];
    if(!practice){ alert("No practice found"); return; }

    titleEl.innerText=practice.name;
    descriptionEl.innerText=practice.description||"";
    durationEl.innerHTML=`<strong>Duration:</strong> ${practice.practicetime} minutes`;

    cycleSteps=[
      {label:"Inhale", seconds:practice.inhale_seconds},
      {label:"Hold", seconds:practice.hold1_seconds},
      {label:"Exhale", seconds:practice.exhale_seconds},
      {label:"Hold", seconds:practice.hold2_seconds}
    ].filter(s=>(s.seconds??0)>0);

    totalTime=practice.practicetime*60;

    applyTheme(practice);
    resizeCanvas();
  }catch(err){ console.error(err); alert("Failed to load practice"); }
}

// ===== Theme =====
function applyTheme(p){
  if(p.bg_color) document.documentElement.style.setProperty("--bg-color",p.bg_color);
  if(p.text_color) document.documentElement.style.setProperty("--text-color",p.text_color);
  if(p.circle_color) document.documentElement.style.setProperty("--particle-color",p.circle_color);
  if(p.bg_start_gradient&&p.bg_end_gradient){
    document.body.style.background=`linear-gradient(${p.bg_start_gradient},${p.bg_end_gradient})`;
  }
}

// ===== Canvas =====
function resizeCanvas(){
  canvas.width=container.clientWidth;
  canvas.height=container.clientHeight;
}

// ===== Particle Engine =====
class Particle{
  constructor(){ this.reset(); }
  reset(){
    this.x=canvas.width/2;
    this.y=canvas.height/2;
    this.vx=(Math.random()-0.5)*1.5;
    this.vy=(Math.random()-0.5)*1.5;
    this.alpha=1;
    this.size=2+Math.random()*2;
  }
  update(stepLabel){
    if(stepLabel==="Inhale"){ this.x+=this.vx; this.y+=this.vy; this.alpha-=0.002; }
    else if(stepLabel==="Exhale"){ this.x-=(this.vx*0.5); this.y-=(this.vy*0.5); this.alpha-=0.002; }
    else this.alpha-=0.001; // Hold: slow fade
  }
  draw(){
    ctx.beginPath();
    ctx.arc(this.x,this.y,this.size,0,2*Math.PI);
    ctx.fillStyle=`rgba(${hexToRgb(practice.circle_color||"#ffffff")},${this.alpha})`;
    ctx.fill();
  }
}

function animateParticles(stepLabel){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  if(particles.length<100) particles.push(new Particle());

  particles.forEach(p=>{ p.update(stepLabel); p.draw(); });
  particles=particles.filter(p=>p.alpha>0);

  if(!stopPractice) requestAnimationFrame(()=>animateParticles(stepLabel));
}

function hexToRgb(hex){
  const shorthand=/^#?([a-f\d])([a-f\d])([a-f\d])([a-f\d])?$/i;
  hex=hex.replace(shorthand,(m,r,g,b)=>r+r+g+g+b+b);
  const result=/^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
  return result?`${parseInt(result[1],16)},${parseInt(result[2],16)},${parseInt(result[3],16)}`:"255,255,255";
}

// ===== Breathing Engine =====
async function startBreathing(){
  const phaseEl=document.getElementById("phase");
  const startTime=performance.now();
  const endTime=startTime+totalTime*1000;

  while(!stopPractice&&performance.now()<endTime){
    const step=cycleSteps[stepIndex];
    phaseEl.innerText=step.label;
    animateParticles(step.label);

    const stepEnd=performance.now()+step.seconds*1000;
    while(performance.now()<stepEnd){
      if(stopPractice) break;
      await new Promise(r=>setTimeout(r,40));
    }

    stepIndex=(stepIndex+1)%cycleSteps.length;
  }

  if(!stopPractice) finishPractice();
}

// ===== Finish =====
async function finishPractice(){
  document.getElementById("phase").innerText="Complete";
  titleEl.classList.remove("fade-out");
  descriptionEl.classList.remove("fade-out");
  durationEl.classList.remove("fade-out");

  if(ambientAudio) fadeOutAudio(ambientAudio,2000);
  if(endAudio&&bellEnabled){ endAudio.volume=0.7; endAudio.play(); }
}

function fadeOutAudio(audio,duration=2000){
  return new Promise(resolve=>{
    if(!audio) return resolve();
    const stepTime=50;
    const steps=duration/stepTime;
    const volStep=audio.volume/steps;
    const fade=setInterval(()=>{
      if(audio.volume>volStep) audio.volume-=volStep;
      else{ audio.volume=0; audio.pause(); clearInterval(fade); resolve(); }
    },stepTime);
  });
}

// ===== Buttons =====
if(ambientToggle){ ambientToggle.addEventListener("click",()=>{
  ambientEnabled=!ambientEnabled;
  ambientToggle.classList.toggle("active",ambientEnabled);
  if(!ambientAudio&&practice?.audio_url){
    ambientAudio=new Audio(practice.audio_url); ambientAudio.loop=true; ambientAudio.volume=0.5;
  }
  if(ambientAudio){ ambientEnabled?ambientAudio.play().catch(()=>{}):ambientAudio.pause(); }
});}

if(bellToggle){ bellToggle.addEventListener("click",()=>{
  bellEnabled=!bellEnabled;
  bellToggle.classList.toggle("active",bellEnabled);
  if(endAudio&&!bellEnabled){ endAudio.pause(); endAudio.currentTime=0; }
});}

if(resetBtn){ resetBtn.addEventListener("click",()=>{
  resetBtn.classList.add("spin"); setTimeout(()=>resetBtn.classList.remove("spin"),450);
  stopPractice=true; particles=[]; stepIndex=0; document.getElementById("phase").innerText="Ready";
  if(ambientAudio){ ambientAudio.pause(); ambientAudio.currentTime=0;}
  if(endAudio){ endAudio.pause(); endAudio.currentTime=0;}
});}

// ===== Start Button =====
const startBtn=document.getElementById("startBtn");
startBtn.addEventListener("click", async()=>{
  const phaseEl=document.getElementById("phase");
  if(playIcon.style.display!=="none"){
    stopPractice=false;
    playIcon.style.display="none";
    pauseIcon.style.display="block";

    titleEl.classList.add("fade-out");
    descriptionEl.classList.add("fade-out");
    durationEl.classList.add("fade-out");

    stepIndex=0; particles=[];

    if(practice.audio_url&&ambientEnabled){
      if(!ambientAudio){ ambientAudio=new Audio(practice.audio_url); ambientAudio.loop=true; ambientAudio.volume=0.5; }
      ambientAudio.currentTime=0; ambientAudio.play().catch(()=>{});
    }
    if(practice.audio_end_url) endAudio=new Audio(practice.audio_end_url);

    await startCountdown();
    await startBreathing();

    playIcon.style.display="block"; pauseIcon.style.display="none";

  } else {
    stopPractice=true;
    playIcon.style.display="block"; pauseIcon.style.display="none";
    phaseEl.innerText="Paused";
    if(ambientAudio){ ambientAudio.pause(); ambientAudio.currentTime=0;}
    if(endAudio){ endAudio.pause();}
  }
});

// ===== Countdown =====
async function startCountdown(){
  const phaseEl=document.getElementById("phase");
  const steps=["3","2","1","Inhale"];
  for(const s of steps){ phaseEl.innerText=s; await new Promise(r=>setTimeout(r,1000)); if(stopPractice) return false; }
  return true;
}

// ===== On Load =====
window.addEventListener("resize",resizeCanvas);
loadPractices();
</script>

</body>
</html>

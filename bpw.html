<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Breathing Practice - Wave Design</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
:root{
  --text-color: #ffffff;
  --bg-color: #ffffff;
  --wave-color: #ffffff;
}

*{
  box-sizing:border-box;
  margin:0;
  padding:0;
}

body{
  font-family:'Inter',sans-serif;
  background:var(--bg-color);
  color:var(--text-color);
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:flex-start;
  height:100vh;
  text-align:center;
  padding-top:60px;
}

#header{
  margin-bottom:40px;
}

#title{
  font-size:clamp(22px,3vw,30px);
  font-weight:600;
}

#description{
  font-size:clamp(14px,2vw,18px);
  font-style:italic;
  opacity:.7;
  margin-top:6px;
  margin-bottom:6px;
  transition: opacity .6s ease;
}

#duration{
  font-style:italic;
  margin-top:2px;
  opacity:.7;
  font-size:clamp(14px,2vw,18px);
  margin-bottom:40px;
  transition: opacity .6s ease;
}

#duration strong{
  font-weight:600;
  opacity:.7;
}

#waveContainer{
  width:min(70vw,420px);
  height:min(70vw,420px);
  margin-bottom:80px;
  position:relative;
}

#phase{
  font-weight:600;
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  font-size:clamp(18px,2.5vw,26px);
}

#startBtn{
  width:80px;
  height:80px;
  border-radius:50%;
  border:none;
  background:rgba(255,255,255,0.2);
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
}

#startBtn svg{
  width:36px;
  height:36px;
  fill:white;
}

#audioControls{
  margin-top:28px;
  display:flex;
  gap:22px;
}

.audioBtn.active{
  background:rgba(255,255,255,0.2);
  border:none;
}

.iconBtn{
  width:80px;
  height:80px;
  border-radius:50%;
  border:none;
  background:rgba(255,255,255,0.2);
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
}

.iconBtn svg{
  width:34px;
  height:34px;
  fill:white;
}

.audioBtn{
  width:64px;
  height:64px;
  border-radius:50%;
  border:none;
  background:rgba(255,255,255,0.2);
  display:flex;
  align-items:center;
  justify-content:center;
  position:relative;
  cursor:pointer;
  transition:transform .15s ease, background .2s ease;
}

.audioBtn svg{
  width:32px;
  height:32px;
  fill:var(--text-color);
}

.audioBtn .strike{
  position:absolute;
  width:80%;
  height:2px;
  background:var(--text-color);
  transform:rotate(-45deg);
  opacity:0;
}

.audioBtn:not(.active) .strike{
  opacity:1;
}

.audioBtn:active,
.iconBtn:active{
  transform:scale(.92);
}

#resetBtn svg{
  width:36px;
  transition: transform .45s cubic-bezier(.34,1.56,.64,1);
}

#resetBtn.spin svg{
  transform: rotate(200deg) scale(1.08);
}
</style>
</head>

<body>

<div id="header">
  <div id="title">Breathing</div>
  <div id="description"></div>
  <div id="duration"></div>
</div>

<div id="waveContainer">
  <canvas id="waveCanvas"></canvas>
  <div id="phase">Ready</div>
</div>

<button id="startBtn" class="iconBtn">
<svg id="playIcon" viewBox="0 0 24 24">
<polygon points="6,4 20,12 6,20"></polygon>
</svg>

<svg id="pauseIcon" viewBox="0 0 24 24" style="display:none">
<rect x="6" y="4" width="4" height="16"></rect>
<rect x="14" y="4" width="4" height="16"></rect>
</svg>
</button>

<div id="audioControls">
  <button id="ambientToggle" class="audioBtn active">
    <svg viewBox="0 0 24 24">
      <path d="M12 3v10.55A4 4 0 1 0 14 17V7h4V3h-6z"/>
    </svg>
    <span class="strike"></span>
  </button>

  <button id="resetBtn" class="audioBtn">
    <svg viewBox="0 0 24 24">
      <path d="M12 5V2L8 6l4 4V7a5 5 0 1 1-5 5H5a7 7 0 1 0 7-7z"/>
    </svg>
  </button>

  <button id="bellToggle" class="audioBtn active">
    <svg viewBox="0 0 24 24">
      <path d="M12 22a2 2 0 0 0 2-2h-4a2 2 0 0 0 2 2zm6-6V11a6 6 0 1 0-12 0v5L4 18v1h16v-1l-2-2z"/>
    </svg>
    <span class="strike"></span>
  </button>
</div>

<script>
const SUPABASE_URL = "https://tppyzexttkuvcobbbmaz.supabase.co";
const SUPABASE_KEY = "sb_publishable_VZiTsc0JGVx6tVf2Zu-9uQ_-FwjGpQW";

let practice = null;
let cycleSteps = [];
let totalTime = 0;
let ambientAudio = null;
let endAudio = null;
let stopPractice = false;
let ambientEnabled = true;
let bellEnabled = true;

const titleEl = document.getElementById("title");
const descriptionEl = document.getElementById("description");
const durationEl = document.getElementById("duration");
const playIcon = document.getElementById("playIcon");
const pauseIcon = document.getElementById("pauseIcon");
const ambientToggle = document.getElementById("ambientToggle");
const resetBtn = document.getElementById("resetBtn");
const bellToggle = document.getElementById("bellToggle");

const waveCanvas = document.getElementById("waveCanvas");
const waveCtx = waveCanvas.getContext("2d");
const waveContainer = document.getElementById("waveContainer");

let stepIndex = 0;
let wavePhase = 0;
let waveAmplitude = 10;
let waveSpeed = 0.05;

// ===== Load Practice =====
async function loadPractices(){
  try{
    const res = await fetch(`${SUPABASE_URL}/rest/v1/breathpractice_with_theme?select=*&id=eq.1`,{
      headers:{apikey:SUPABASE_KEY, Authorization:`Bearer ${SUPABASE_KEY}`}
    });
    if(!res.ok) throw new Error(`Supabase error ${res.status}`);

    const data = await res.json();
    practice = data[0];
    if(!practice){ alert("No practice found"); return; }

    titleEl.innerText = practice.name;
    descriptionEl.innerText = practice.description || "";
    durationEl.innerHTML = `<strong>Duration:</strong> ${practice.practicetime} minutes`;

    cycleSteps = [
      {label:"Inhale", seconds:practice.inhale_seconds},
      {label:"Hold", seconds:practice.hold1_seconds},
      {label:"Exhale", seconds:practice.exhale_seconds},
      {label:"Hold", seconds:practice.hold2_seconds}
    ].filter(s => (s.seconds??0)>0);

    totalTime = practice.practicetime * 60;

    applyTheme(practice);
    resizeCanvas();
  }catch(err){
    console.error(err);
    alert("Failed to load practice");
  }
}

// ===== Theme =====
function applyTheme(p){
  if(p.bg_color) document.documentElement.style.setProperty("--bg-color", p.bg_color);
  if(p.text_color) document.documentElement.style.setProperty("--text-color", p.text_color);
  if(p.circle_color) document.documentElement.style.setProperty("--wave-color", p.circle_color);
  if(p.bg_start_gradient && p.bg_end_gradient){
    document.body.style.background = `linear-gradient(${p.bg_start_gradient}, ${p.bg_end_gradient})`;
  }
}

// ===== Canvas =====
function resizeCanvas(){
  waveCanvas.width = waveContainer.clientWidth;
  waveCanvas.height = waveContainer.clientHeight;
}

// ===== Wave Animation =====
function animateWave(){
  waveCtx.clearRect(0,0,waveCanvas.width,waveCanvas.height);

  const step = cycleSteps[stepIndex];
  let targetAmp = 10;
  if(step.label==="Inhale") targetAmp=25;
  else if(step.label==="Exhale") targetAmp=10;
  else targetAmp=15;

  waveAmplitude += (targetAmp - waveAmplitude) * 0.05;

  waveCtx.beginPath();
  for(let x=0;x<waveCanvas.width;x++){
    const y = waveCanvas.height/2 + waveAmplitude*Math.sin((x*0.05)+wavePhase);
    waveCtx.lineTo(x,y);
  }
  waveCtx.strokeStyle = practice.circle_color || "#ffffff";
  waveCtx.lineWidth = 3;
  waveCtx.stroke();

  wavePhase += waveSpeed;

  if(!stopPractice) requestAnimationFrame(animateWave);
}

// ===== Breathing Engine =====
async function startBreathing(){
  const phaseEl = document.getElementById("phase");
  const startTime = performance.now();
  const endTime = startTime + totalTime*1000;

  while(!stopPractice && performance.now() < endTime){
    const step = cycleSteps[stepIndex];
    phaseEl.innerText = step.label;

    const stepEnd = performance.now() + step.seconds*1000;
    while(performance.now() < stepEnd){
      if(stopPractice) break;
      await new Promise(r => setTimeout(r,40));
    }

    stepIndex = (stepIndex+1) % cycleSteps.length;
  }

  if(!stopPractice) finishPractice();
}

// ===== Finish =====
async function finishPractice(){
  document.getElementById("phase").innerText="Complete";
  titleEl.classList.remove("fade-out");
  descriptionEl.classList.remove("fade-out");
  durationEl.classList.remove("fade-out");

  if(ambientAudio) fadeOutAudio(ambientAudio,2000);
  if(endAudio && bellEnabled){
    endAudio.volume = 0.7;
    endAudio.play();
  }
}

function fadeOutAudio(audio,duration=2000){
  return new Promise(resolve=>{
    if(!audio) return resolve();
    const stepTime=50;
    const steps=duration/stepTime;
    const volumeStep=audio.volume/steps;
    const fade=setInterval(()=>{
      if(audio.volume>volumeStep) audio.volume-=volumeStep;
      else{ audio.volume=0; audio.pause(); clearInterval(fade); resolve();}
    },stepTime);
  });
}

// ===== Buttons =====
if (ambientToggle){
  ambientToggle.addEventListener("click",()=>{
    ambientEnabled=!ambientEnabled;
    ambientToggle.classList.toggle("active",ambientEnabled);

    if(!ambientAudio && practice?.audio_url){
      ambientAudio = new Audio(practice.audio_url);
      ambientAudio.loop=true;
      ambientAudio.volume=0.5;
    }
    if(ambientAudio){
      if(ambientEnabled){
        ambientAudio.currentTime=0;
        ambientAudio.play().catch(()=>{});
      } else ambientAudio.pause();
    }
  });
}

if(bellToggle){
  bellToggle.addEventListener("click",()=>{
    bellEnabled=!bellEnabled;
    bellToggle.classList.toggle("active",bellEnabled);
    if(endAudio && !bellEnabled){ endAudio.pause(); endAudio.currentTime=0;}
  });
}

if(resetBtn){
  resetBtn.addEventListener("click",()=>{
    resetBtn.classList.add("spin");
    setTimeout(()=> resetBtn.classList.remove("spin"),450);

    stopPractice=true;
    waveAmplitude=10;
    stepIndex=0;
    document.getElementById("phase").innerText="Ready";

    if(ambientAudio){ ambientAudio.pause(); ambientAudio.currentTime=0;}
    if(endAudio){ endAudio.pause(); endAudio.currentTime=0;}
  });
}

// ===== Start Button =====
const startBtn = document.getElementById("startBtn");
startBtn.addEventListener("click", async()=>{
  const phaseEl = document.getElementById("phase");

  if(playIcon.style.display !== "none"){
    stopPractice=false;
    playIcon.style.display="none";
    pauseIcon.style.display="block";

    titleEl.classList.add("fade-out");
    descriptionEl.classList.add("fade-out");
    durationEl.classList.add("fade-out");

    stepIndex=0;
    waveAmplitude=10;

    if(practice.audio_url && ambientEnabled){
      if(!ambientAudio){
        ambientAudio=new Audio(practice.audio_url);
        ambientAudio.loop=true;
        ambientAudio.volume=0.5;
      }
      ambientAudio.currentTime=0;
      ambientAudio.play().catch(()=>{});
    }
    if(practice.audio_end_url) endAudio=new Audio(practice.audio_end_url);

    await startCountdown();
    animateWave();
    await startBreathing();

    playIcon.style.display="block";
    pauseIcon.style.display="none";

  } else {
    stopPractice=true;
    playIcon.style.display="block";
    pauseIcon.style.display="none";
    phaseEl.innerText="Paused";
    if(ambientAudio){ ambientAudio.pause(); ambientAudio.currentTime=0;}
    if(endAudio){ endAudio.pause();}
  }
});

// ===== Countdown =====
async function startCountdown(){
  const phaseEl = document.getElementById("phase");
  const steps = ["3","2","1","Inhale"];
  for(const s of steps){
    phaseEl.innerText=s;
    await new Promise(r=>setTimeout(r,1000));
    if(stopPractice) return false;
  }
  return true;
}

// ===== On Load =====
window.addEventListener("resize",resizeCanvas);
loadPractices();
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Breathing Practice</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
:root{
  --circle-size: min(60vw, 420px);
  --text-color: white;
  --circle-color: white;
  --bg-color: black;
}

*{
  box-sizing:border-box;
  margin:0;
  padding:0;
}

body{
  font-family:'Inter',sans-serif;
  background:var(--bg-color);
  color:var(--text-color);
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  height:100vh;
  text-align:center;
}

#title{
  font-size:clamp(20px,3vw,28px);
  margin-bottom:20px;
  opacity:.9;
}

#circle{
  width:var(--circle-size);
  height:var(--circle-size);
  border-radius:50%;
  border:3px solid var(--circle-color);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:clamp(18px,2.5vw,26px);
  transition:transform linear;
}

#phase{
  opacity:.9;
}

#timer{
  margin-top:25px;
  font-size:clamp(14px,2vw,18px);
  opacity:.6;
  margin-bottom:20px;
}

#startBtn{
  padding:14px 28px;
  border-radius:40px;
  border:none;
  background:rgba(255,255,255,0.2);
  color:white;
  font-size:16px;
  cursor:pointer;
}
</style>
</head>

<body>

<div id="title">Breathing</div>

<div id="circle">
  <div id="phase">Ready</div>
</div>

<div id="timer"></div>

<button id="startBtn">Start Practice</button>

<script>
const SUPABASE_URL = "https://tppyzexttkuvcobbbmaz.supabase.co/rest/v1/breathpractice_with_theme";
const SUPABASE_KEY = "sb_publishable_cSllA7ncMuvdwRmtNzC6pQ_B7qpmjDm";

let practices = [];
let practice = null;
let cycleSteps = [];
let totalTime = 0;
let ambientAudio = null;
let endAudio = null;

// Load practices from Supabase
async function loadPractices() {
  try {
    const res = await fetch(`${SUPABASE_URL}?select=*`, {
      headers: {
        "apikey": SUPABASE_KEY,
        "Authorization": `Bearer ${SUPABASE_KEY}`
      }
    });

    if (!res.ok) throw new Error(`Supabase error: ${res.status} ${res.statusText}`);

    practices = await res.json();
    console.log("Practices loaded:", practices);

    // pick first active practice or fallback
    practice = practices.find(p => p.active) || practices[0];
    if (!practice) return alert("No practice found!");

    document.getElementById("title").innerText = practice.name;

    // Prepare cycle steps
    cycleSteps = [
      { label: "Inhale", seconds: practice.inhale_seconds, scale: 1.3 },
      { label: "Hold", seconds: practice.hold1_seconds, scale: 1.3 },
      { label: "Exhale", seconds: practice.exhale_seconds, scale: 1 },
      { label: "Hold", seconds: practice.hold2_seconds, scale: 1 }
    ].filter(s => s.seconds > 0);

    totalTime = practice.practicetime * 60;

  } catch (err) {
    console.error(err);
    alert("Failed to load practices. Check your API key and URL.");
  }
}

// Start button click
document.getElementById("startBtn").addEventListener("click", async () => {
  document.getElementById("startBtn").style.display = "none";

  // Ambient audio
  if(practice.audio_url){
    ambientAudio = new Audio(practice.audio_url);
    ambientAudio.loop = true;
    ambientAudio.volume = 0.6;
    ambientAudio.play();
  }

  if(practice.audio_end_url){
    endAudio = new Audio(practice.audio_end_url);
  }

  await startBreathing();
});

// Main breathing loop
async function startBreathing() {
  let elapsed = 0;

  while (elapsed < totalTime) {
    for (const step of cycleSteps) {
      if (elapsed >= totalTime) break;
      await runStep(step);
      elapsed += step.seconds;
      updateTimer(elapsed);
    }
  }

  finishPractice();
}

// Animate a single step
function runStep(step) {
  return new Promise(resolve => {
    const circle = document.getElementById("circle");
    const phase = document.getElementById("phase");

    phase.innerText = step.label;
    circle.style.transitionDuration = step.seconds + "s";
    circle.style.transform = `scale(${step.scale})`;

    setTimeout(resolve, step.seconds * 1000);
  });
}

// Update countdown timer
function updateTimer(elapsed){
  const remaining = Math.max(0, totalTime - elapsed);
  const min = Math.floor(remaining/60);
  const sec = remaining % 60;
  document.getElementById("timer").innerText = `${min}:${sec.toString().padStart(2,'0')}`;
}

// End of practice
function finishPractice(){
  document.getElementById("phase").innerText = "Complete";

  if(ambientAudio) ambientAudio.pause();
  if(endAudio) endAudio.play();
}

// Load practices on page load
loadPractices();
</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Breathing Practice</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>

:root{
--circle-size: min(60vw, 420px);
--text-color: white;
--circle-color: white;
--bg-color: black;
}

*{
box-sizing:border-box;
margin:0;
padding:0;
}

body{
font-family:'Inter',sans-serif;
background:var(--bg-color);
color:var(--text-color);
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
height:100vh;
text-align:center;
}

#title{
font-size:clamp(20px,3vw,28px);
margin-bottom:20px;
opacity:.9;
}

#circle{
width:var(--circle-size);
height:var(--circle-size);
border-radius:50%;
border:3px solid var(--circle-color);
display:flex;
align-items:center;
justify-content:center;
font-size:clamp(18px,2.5vw,26px);
transition:transform linear;
}

#phase{
opacity:.9;
}

#timer{
margin-top:25px;
font-size:clamp(14px,2vw,18px);
opacity:.6;
}

</style>
</head>

<body>

<div id="title">Breathing</div>

<div id="circle">
<div id="phase">Ready</div>
</div>

<div id="timer"></div>

<script>
let practices=[];
let practice=null;

let cycleSteps=[];
let cycleDuration=0;
let totalTime=0;

let ambientAudio=null;
let endAudio=null;
  
const SUPABASE_URL = "https://tppyzexttkuvcobbbmaz.supabase.co";
const SUPABASE_KEY = "sb_publishable_cSllA7ncMuvdwRmtNzC6pQ_B7qpmjDm";

async function loadPractices() {
  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/breathpractice_with_theme?select=*`, {
      headers: {
        "apikey": SUPABASE_KEY,
        "Authorization": `Bearer ${SUPABASE_KEY}`,
        "Content-Type": "application/json"
      }
    });

    if (!res.ok) {
      throw new Error(`Supabase error: ${res.status} ${res.statusText}`);
    }

    const data = await res.json();
    console.log("Practices loaded:", data);
    return data;

  } catch (err) {
    console.error(err);
  }
}

loadPractices();

/* for now load first active practice */

practice=practices.find(p=>p.active) || practices[0];

initPractice();

}

function initPractice(){

document.getElementById("title").innerText=practice.name;

cycleSteps=[
{label:"Inhale",seconds:practice.inhale_seconds,scale:1.3},
{label:"Hold",seconds:practice.hold1_seconds,scale:1.3},
{label:"Exhale",seconds:practice.exhale_seconds,scale:1},
{label:"Hold",seconds:practice.hold2_seconds,scale:1}
].filter(s=>s.seconds>0);

cycleDuration=practice.total_cycle_seconds;

totalTime=practice.practicetime*60;

/* audio */

if(practice.audio_url){
ambientAudio=new Audio(practice.audio_url);
ambientAudio.loop=true;
ambientAudio.volume=.6;
ambientAudio.play();
}

if(practice.audio_end_url){
endAudio=new Audio(practice.audio_end_url);
}

startBreathing();

}

async function startBreathing(){

let elapsed=0;

while(elapsed<totalTime){

for(const step of cycleSteps){

if(elapsed>=totalTime) break;

await runStep(step);

elapsed+=step.seconds;

updateTimer(elapsed);

}

}

finishPractice();

}

function runStep(step){

return new Promise(resolve=>{

const circle=document.getElementById("circle");
const phase=document.getElementById("phase");

phase.innerText=step.label;

circle.style.transitionDuration=step.seconds+"s";
circle.style.transform=`scale(${step.scale})`;

setTimeout(resolve,step.seconds*1000);

});

}

function updateTimer(elapsed){

const remaining=Math.max(0,totalTime-elapsed);

const min=Math.floor(remaining/60);
const sec=remaining%60;

document.getElementById("timer").innerText=
`${min}:${sec.toString().padStart(2,'0')}`;

}

function finishPractice(){

document.getElementById("phase").innerText="Complete";

if(ambientAudio) ambientAudio.pause();

if(endAudio) endAudio.play();

}

loadPractices();

</script>

</body>
</html>
